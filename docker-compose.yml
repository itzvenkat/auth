services:
  api:
    build:
      context: .
      target: production
    container_name: auth-api
    env_file:
      - path: .env
        required: true
      - path: .env.development
        required: false # optional — create from .env.development.example
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: development
      DB_HOST: postgres
      SMTP_HOST: mailhog
      SMTP_PORT: "1025"
      SMTP_SECURE: "false"
      SMTP_FROM: '"Auth Service" <noreply@auth.local>'
      GOOGLE_CALLBACK_URL: http://localhost:3000/auth/google/callback
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health" ]
      interval: 30s
      timeout: 10s
      start_period: 45s
      retries: 3

  postgres:
    image: postgres:16-alpine
    container_name: auth-postgres
    environment:
      POSTGRES_USER: ${DB_USERNAME:-authuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-authpass}
      POSTGRES_DB: ${DB_DATABASE:-authdb}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME:-authuser} -d ${DB_DATABASE:-authdb}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mailhog:
    image: mailhog/mailhog:latest
    container_name: auth-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    restart: unless-stopped

volumes:
  postgres-data:
